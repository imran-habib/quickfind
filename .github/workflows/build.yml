name: Build Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --noconsole --name findfast findfast.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: findfast-windows
          path: dist/findfast.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name findfast-linux findfast.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: findfast-linux
          path: dist/findfast-linux

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: findfast-windows

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: findfast-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            findfast.exe
            findfast-linux
